<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YJM Power</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0F1E;--ink2:#131929;--ink3:#1C2640;--blue:#1B5FD4;--blue2:#2D7EFF;--gold:#F0A500;--green:#0DBF6F;--red:#F03E3E;--purple:#7B5CF0;--teal:#0CC2AA;--pink:#F045B0;--white:#F0F4FF;--muted:#5A7090;--border:rgba(45,126,255,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#fff}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:2px;background:linear-gradient(90deg,var(--white),var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.user-switcher{display:flex;gap:4px;background:rgba(28,38,64,0.8);border:1px solid var(--border);border-radius:8px;padding:3px}
.usr{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;color:var(--muted);border:none;background:transparent;font-family:'DM Sans',sans-serif}
.usr.active{background:var(--blue);color:#fff}
.screen{display:none}.screen.active{display:block}
.screen-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;margin-top:16px}
.stab{padding:10px 16px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;font-family:'DM Sans',sans-serif;margin-bottom:-1px}
.stab.active{color:var(--blue2);border-bottom-color:var(--blue2)}
.wrap{max-width:900px;margin:0 auto;padding:0 14px 80px}
.today-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-top:4px;flex-wrap:wrap;gap:12px}
.today-greeting{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.today-date{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.today-stats{display:flex;gap:6px;flex-wrap:wrap}
.stat-pill{background:rgba(28,38,64,0.8);border:1px solid var(--border);border-radius:8px;padding:6px 12px;text-align:center}
.stat-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;line-height:1}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.zone{background:rgba(19,25,41,0.7);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.zone-hdr{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.zone-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.zdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.zone-count{font-size:10px;font-weight:700;background:rgba(45,126,255,0.12);border:1px solid rgba(45,126,255,0.2);color:var(--blue2);border-radius:5px;padding:2px 7px}
.zone-body{padding:8px 10px}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:9px 10px;border-radius:9px;margin-bottom:5px;cursor:pointer;transition:all 0.18s;border:1px solid transparent;background:rgba(28,38,64,0.5)}
.task-item:hover{background:rgba(45,126,255,0.08);border-color:rgba(45,126,255,0.2)}
.task-item.done{opacity:0.4}
.task-cb{width:17px;height:17px;border-radius:4px;flex-shrink:0;margin-top:1px;border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.task-cb.checked{background:var(--green);border-color:var(--green)}
.task-cb.checked::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.task-content{flex:1;min-width:0}
.task-title{font-size:12px;font-weight:500;line-height:1.3;margin-bottom:4px}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.task-tag{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.i5{background:rgba(240,165,0,0.12);color:var(--gold);border:1px solid rgba(240,165,0,0.2)}
.i4{background:rgba(240,62,62,0.1);color:#FF7070;border:1px solid rgba(240,62,62,0.2)}
.i3{background:rgba(45,126,255,0.1);color:var(--blue2);border:1px solid rgba(45,126,255,0.2)}
.i2{background:rgba(90,112,144,0.15);color:var(--muted);border:1px solid rgba(90,112,144,0.2)}
.case-tag{background:rgba(28,38,64,0.8);color:var(--muted);border:1px solid var(--border);font-size:9px;padding:2px 6px;border-radius:4px}
.dl{font-size:9px;color:var(--muted)}
.dl.urgent{color:var(--red)}
.badge-priv{background:rgba(240,69,176,0.1);border:1px solid rgba(240,69,176,0.25);color:var(--pink);font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.flag-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;font-size:11px}
.flag-item.blocked{border:1px solid rgba(240,62,62,0.18);background:rgba(240,62,62,0.04)}
.flag-item.overdue{border:1px solid rgba(240,165,0,0.18);background:rgba(240,165,0,0.04)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
.capture-wrap{max-width:600px;margin:0 auto}
.capture-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px}
.capture-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.domain-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px}
@media(max-width:500px){.domain-grid{grid-template-columns:repeat(4,1fr)}}
.dom-btn{background:rgba(19,25,41,0.8);border:1px solid var(--border);border-radius:9px;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.18s}
.dom-btn:hover,.dom-btn.selected{border-color:var(--blue2);background:rgba(45,126,255,0.1)}
.dom-btn.priv{border-color:rgba(240,69,176,0.2)}
.dom-btn.priv.selected{border-color:var(--pink);background:rgba(240,69,176,0.1)}
.dom-icon{font-size:16px;display:block;margin-bottom:2px}
.dom-label{font-size:8px;font-weight:600;color:var(--muted)}
.capture-box{background:rgba(19,25,41,0.8);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.capture-box:focus-within{border-color:var(--blue2)}
.capture-input{width:100%;background:transparent;border:none;outline:none;padding:14px 16px;font-size:13px;color:var(--white);font-family:'DM Sans',sans-serif;line-height:1.6;min-height:100px;resize:none}
.capture-input::placeholder{color:var(--muted)}
.capture-toolbar{padding:8px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.gen-btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.2s;margin-bottom:16px}
.gen-btn:hover{opacity:0.9}
.gen-btn:disabled{opacity:0.6;cursor:not-allowed}
.ai-result{background:rgba(19,25,41,0.9);border:1px solid rgba(45,126,255,0.25);border-radius:12px;padding:16px;display:none}
.ai-result.show{display:block}
.ar-hdr{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--blue2);margin-bottom:12px}
.ar-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.ar-outcome{font-size:12px;font-weight:600;color:var(--green);background:rgba(13,191,111,0.08);border:1px solid rgba(13,191,111,0.18);border-radius:7px;padding:8px 12px;margin-bottom:12px}
.ar-task{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:4px;background:rgba(28,38,64,0.6);border:1px solid var(--border);font-size:11px}
.owner-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:auto;flex-shrink:0}
.oy{background:rgba(240,165,0,0.12);color:var(--gold);border:1px solid rgba(240,165,0,0.2)}
.ok{background:rgba(123,92,240,0.12);color:var(--purple);border:1px solid rgba(123,92,240,0.2)}
.of{background:rgba(45,126,255,0.12);color:var(--blue2);border:1px solid rgba(45,126,255,0.2)}
.os{background:rgba(13,194,170,0.12);color:var(--teal);border:1px solid rgba(13,194,170,0.2)}
.od{background:rgba(13,191,111,0.12);color:var(--green);border:1px solid rgba(13,191,111,0.2)}
.ar-actions{display:flex;gap:8px;margin-top:14px}
.approve-btn{flex:1;padding:11px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--green),#0AA85E);color:#fff;font-weight:700;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Syne',sans-serif}
.edit-btn{padding:11px 16px;border-radius:9px;background:rgba(28,38,64,0.8);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.case-list{display:grid;gap:8px}
.case-card{background:rgba(19,25,41,0.8);border:1px solid var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:12px}
.case-card:hover{border-color:rgba(45,126,255,0.3)}
.case-card.open-case{border-color:rgba(45,126,255,0.4);background:rgba(45,126,255,0.06)}
.case-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(28,38,64,0.8);border:1px solid var(--border);flex-shrink:0}
.case-info{flex:1}
.case-title{font-size:12px;font-weight:600;margin-bottom:4px}
.case-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cs{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:4px}
.cs-active{background:rgba(45,126,255,0.12);color:var(--blue2);border:1px solid rgba(45,126,255,0.2)}
.cs-blocked{background:rgba(240,62,62,0.1);color:var(--red);border:1px solid rgba(240,62,62,0.2)}
.cs-review{background:rgba(240,165,0,0.1);color:var(--gold);border:1px solid rgba(240,165,0,0.2)}
.cs-new{background:rgba(13,194,170,0.1);color:var(--teal);border:1px solid rgba(13,194,170,0.2)}
.prog-bar{width:50px;height:3px;background:rgba(28,38,64,0.8);border-radius:2px;overflow:hidden;margin-left:auto}
.prog-fill{height:100%;border-radius:2px;background:var(--blue2)}
.case-detail{background:rgba(19,25,41,0.85);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:10px;display:none}
.case-detail.show{display:block}
.cd-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:4px}
.cd-domain{font-size:10px;color:var(--muted);margin-bottom:10px}
.cd-outcome{background:rgba(13,191,111,0.07);border:1px solid rgba(13,191,111,0.18);border-radius:8px;padding:10px 14px;margin-bottom:14px}
.cd-ol{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--green);margin-bottom:3px}
.cd-ov{font-size:12px}
.cd-sl{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;margin-top:14px}
.close-btn{float:right;background:rgba(28,38,64,0.6);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.add-task-form{background:rgba(28,38,64,0.5);border:1px solid var(--border);border-radius:9px;padding:12px;margin-top:10px}
.form-input{width:100%;background:rgba(10,15,30,0.6);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;margin-bottom:7px}
.form-input:focus{border-color:var(--blue2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.form-select{width:100%;background:rgba(10,15,30,0.6);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;outline:none}
.submit-btn{width:100%;padding:9px;border-radius:7px;border:none;background:var(--blue);color:#fff;font-weight:700;font-size:11px;letter-spacing:1px;cursor:pointer;font-family:'Syne',sans-serif}
.team-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;background:rgba(19,25,41,0.7);border:1px solid var(--border);border-radius:11px;padding:14px}
.team-avatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex-shrink:0}
.team-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.team-role{font-size:10px;color:var(--muted);margin-top:2px}
.kajal-task{background:rgba(19,25,41,0.8);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:8px}
.kajal-task-hdr{padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.kajal-task-title{font-size:12px;font-weight:600;flex:1}
.kajal-expand{font-size:11px;color:var(--muted);transition:transform 0.2s}
.kajal-expand.open{transform:rotate(180deg)}
.kajal-instructions{padding:0 14px 14px;display:none;border-top:1px solid var(--border);padding-top:12px}
.kajal-instructions.show{display:block}
.ki-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--purple);margin-bottom:7px}
.ki-step{display:flex;gap:8px;margin-bottom:7px;font-size:11px;color:rgba(240,244,255,0.85);line-height:1.5}
.ki-num{width:18px;height:18px;border-radius:4px;flex-shrink:0;background:rgba(123,92,240,0.15);border:1px solid rgba(123,92,240,0.25);color:var(--purple);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.completion-input{width:100%;background:rgba(10,15,30,0.6);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:11px;outline:none;resize:none;height:55px;margin-top:10px}
.completion-input:focus{border-color:var(--purple)}
.mark-done-btn{width:100%;margin-top:7px;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--purple),#9B7FF5);color:#fff;font-weight:700;font-size:10px;letter-spacing:2px;cursor:pointer;font-family:'Syne',sans-serif}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,15,30,0.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:center;gap:0;padding:0 16px}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 20px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.18s;font-family:'DM Sans',sans-serif;border-top:2px solid transparent;margin-top:-1px}
.bnav-btn.active{color:var(--blue2);border-top-color:var(--blue2)}
.bnav-icon{font-size:18px;line-height:1}
.bnav-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:9px 18px;border-radius:9px;font-size:11px;font-weight:700;letter-spacing:1px;opacity:0;transition:opacity 0.3s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.empty{text-align:center;padding:30px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-text{font-size:13px;font-weight:600}
.empty-sub{font-size:11px;margin-top:5px}
.new-case-btn{width:100%;padding:12px;border-radius:10px;border:none;background:rgba(28,38,64,0.8);border:1px solid var(--border);color:var(--white);font-size:12px;font-weight:600;cursor:pointer;margin-bottom:12px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
.new-case-btn:hover{border-color:var(--blue2)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">YJM</div>
    <div class="logo-name">POWER</div>
  </div>
  <div class="user-switcher" id="userSwitcher">
    <button class="usr active" onclick="switchUser('yash',this)">YASH</button>
    <button class="usr" onclick="switchUser('kajal',this)">KAJAL</button>
    <button class="usr" onclick="switchUser('fazal',this)">FAZAL</button>
    <button class="usr" onclick="switchUser('sanjay',this)">SANJAY</button>
    <button class="usr" onclick="switchUser('deepak',this)">DEEPAK</button>
  </div>
</div>

<div class="wrap" id="mainWrap">

  <!-- YASH VIEW -->
  <div id="view-yash">
    <div class="screen-tabs">
      <button class="stab active" onclick="switchTab('today','yash',this)">Today</button>
      <button class="stab" onclick="switchTab('capture','yash',this)">Capture</button>
      <button class="stab" onclick="switchTab('cases','yash',this)">Cases</button>
    </div>

    <!-- TODAY -->
    <div class="screen active" id="yash-today">
      <div class="today-header">
        <div>
          <div class="today-greeting" id="greeting">Good Morning, Yash</div>
          <div class="today-date" id="todayDate"></div>
        </div>
        <div class="today-stats">
          <div class="stat-pill"><div class="stat-num" id="statTasks" style="color:var(--gold)">-</div><div class="stat-lbl">Tasks</div></div>
          <div class="stat-pill"><div class="stat-num" id="statBlocked" style="color:var(--red)">-</div><div class="stat-lbl">Blocked</div></div>
          <div class="stat-pill"><div class="stat-num" id="statOverdue" style="color:var(--gold)">-</div><div class="stat-lbl">Overdue</div></div>
          <div class="stat-pill"><div class="stat-num" id="statCases" style="color:var(--teal)">-</div><div class="stat-lbl">Cases</div></div>
        </div>
      </div>

      <div class="zone">
        <div class="zone-hdr">
          <div class="zone-title"><div class="zdot" style="background:var(--gold)"></div>Suggested Tasks</div>
          <div class="zone-count" id="taskCount">0</div>
        </div>
        <div class="zone-body" id="taskList"><div class="loading">Loading tasks...</div></div>
      </div>

      <div class="two-col">
        <div class="zone">
          <div class="zone-hdr">
            <div class="zone-title"><div class="zdot" style="background:var(--red)"></div>Blocked</div>
            <div class="zone-count" id="blockedCount" style="color:var(--red);border-color:rgba(240,62,62,0.2);background:rgba(240,62,62,0.08)">0</div>
          </div>
          <div class="zone-body" id="blockedList"><div class="loading">Loading...</div></div>
        </div>
        <div class="zone">
          <div class="zone-hdr">
            <div class="zone-title"><div class="zdot" style="background:var(--gold)"></div>Overdue</div>
            <div class="zone-count" id="overdueCount" style="color:var(--gold);border-color:rgba(240,165,0,0.2);background:rgba(240,165,0,0.08)">0</div>
          </div>
          <div class="zone-body" id="overdueList"><div class="loading">Loading...</div></div>
        </div>
      </div>
    </div>

    <!-- CAPTURE -->
    <div class="screen" id="yash-capture">
      <div class="capture-wrap">
        <div class="capture-title">Capture</div>
        <div class="capture-sub">Describe any problem. AI structures it instantly.</div>
        <div style="margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted)">SELECT DOMAIN</div>
        <div class="domain-grid" id="domainGrid"></div>
        <div class="capture-box">
          <textarea class="capture-input" id="captureInput" placeholder="Describe your problem or task..." oninput="updateCharCount(this)"></textarea>
          <div class="capture-toolbar">
            <span style="font-size:11px;color:var(--muted)">What needs to happen?</span>
            <span style="font-size:11px;color:var(--muted);font-family:monospace" id="charCount">0/500</span>
          </div>
        </div>
        <div style="margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted)">OUTCOME</div>
        <input type="text" class="form-input" id="outcomeInput" placeholder="e.g. Payment received within 7 days" style="margin-bottom:12px">
        <button class="gen-btn" id="createCaseBtn" onclick="createCase()">⚡ CREATE CASE</button>
        <div class="ai-result" id="aiResult">
          <div class="ar-hdr">✅ CASE CREATED</div>
          <div class="ar-outcome" id="createdCaseTitle"></div>
          <div class="ar-actions">
            <button class="approve-btn" onclick="goToCases()">VIEW CASES →</button>
            <button class="edit-btn" onclick="resetCapture()">NEW CAPTURE</button>
          </div>
        </div>
      </div>
    </div>

    <div class="screen" id="yash-cases">
      <div id="casesList"><div class="loading">Loading cases...</div></div>
    </div>
  </div>
</div>

<div class="bottom-nav" id="bottomNav">
  <button class="bnav-btn active" id="bnav-today" onclick="switchTab('today','yash',null);setActiveNav('bnav-today')">
    <span class="bnav-icon">🏠</span><span class="bnav-label">Today</span>
  </button>
  <button class="bnav-btn" id="bnav-capture" onclick="switchTab('capture','yash',null);setActiveNav('bnav-capture')">
    <span class="bnav-icon">⚡</span><span class="bnav-label">Capture</span>
  </button>
  <button class="bnav-btn" id="bnav-cases" onclick="switchTab('cases','yash',null);setActiveNav('bnav-cases')">
    <span class="bnav-icon">📂</span><span class="bnav-label">Cases</span>
  </button>
</div>
<div class="toast" id="toast"></div>
</body>
</html>
