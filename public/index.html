<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YJM Power</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--ink:#0A0F1E;
--blue:#1B5FD4;
--blue2:#2D7EFF;
--gold:#F0A500;
--green:#0DBF6F;
--red:#F03E3E;
--purple:#7B5CF0;
--teal:#0CC2AA;
--pink:#F045B0;
--white:#F0F4FF;
--muted:#5A7090;
--border:rgba(45,126,255,0.15)
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--ink);
color:var(--white);
font-family:'DM Sans',sans-serif;
min-height:100vh
}

.topbar{
position:sticky;
top:0;
z-index:100;
background:rgba(10,15,30,0.97);
border-bottom:1px solid var(--border);
padding:0 12px;
display:flex;
align-items:center;
justify-content:space-between;
height:54px
}

.logo{display:flex;align-items:center;gap:8px}

.logo-mark{
width:30px;
height:30px;
background:linear-gradient(135deg,var(--blue),var(--blue2));
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
font-family:'Syne',sans-serif;
font-weight:800;
font-size:11px;
color:#fff
}

.logo-name{
font-family:'Syne',sans-serif;
font-weight:800;
font-size:14px;
letter-spacing:2px;
color:var(--white)
}

.usw{
display:flex;
gap:3px;
background:rgba(28,38,64,0.8);
border:1px solid var(--border);
border-radius:8px;
padding:3px
}

.usr{
padding:5px 9px;
border-radius:5px;
font-size:10px;
font-weight:700;
letter-spacing:1px;
cursor:pointer;
color:var(--muted);
border:none;
background:transparent;
font-family:'DM Sans',sans-serif
}

.usr.active{
background:var(--blue);
color:#fff
}

.wrap{
max-width:900px;
margin:0 auto;
padding:0 12px 80px
}

.stabs{
display:flex;
border-bottom:1px solid var(--border);
margin-bottom:18px;
margin-top:14px
}

.stab{
padding:10px 16px;
font-size:11px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
cursor:pointer;
border:none;
background:transparent;
color:var(--muted);
border-bottom:2px solid transparent;
font-family:'DM Sans',sans-serif;
margin-bottom:-1px
}

.stab.active{
color:var(--blue2);
border-bottom-color:var(--blue2)
}

.pane{display:none}
.pane.active{display:block}

.uview{display:none}
.uview.active{display:block}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">
<div class="logo-mark">YJM</div>
<div class="logo-name">POWER</div>
</div>

<div class="usw">

<button class="usr active" onclick="switchUser('yash',this)">YASH</button>
<button class="usr" onclick="switchUser('kajal',this)">KAJAL</button>
<button class="usr" onclick="switchUser('fazal',this)">FAZAL</button>
<button class="usr" onclick="switchUser('sanjay',this)">SANJAY</button>
<button class="usr" onclick="switchUser('deepak',this)">DEEPAK</button>

</div>

</div>


<div class="wrap">

<div id="vu-yash" class="uview active">

<div class="stabs">

<button class="stab active" id="tab-yash-today" onclick="switchTab('yash','today')">Today</button>
<button class="stab" id="tab-yash-capture" onclick="switchTab('yash','capture')">Capture</button>
<button class="stab" id="tab-yash-cases" onclick="switchTab('yash','cases')">Cases</button>

</div>


<div id="pane-yash-today" class="pane active">

<h2 id="greeting">Good Morning, Yash</h2>

<div id="taskList">
No tasks yet
</div>

</div>


<div id="pane-yash-capture" class="pane">

<textarea id="captureInput" placeholder="Describe your problem"></textarea>

<br><br>

<button onclick="createCase()">Create Case</button>

</div>


<div id="pane-yash-cases" class="pane">

<div id="casesList">
No cases yet
</div>

</div>


</div>

</div>


<script>

var curUser='yash'
var cases=[]

window.onload=function(){
setDate()
}


function setDate(){

var d=new Date()
var h=d.getHours()

var g=document.getElementById('greeting')

if(h<12){
g.innerText="Good Morning, Yash"
}
else if(h<17){
g.innerText="Good Afternoon, Yash"
}
else{
g.innerText="Good Evening, Yash"
}

}


function switchUser(user,btn){

curUser=user

var ubtns=document.querySelectorAll('.usr')
ubtns.forEach(function(b){b.classList.remove('active')})

if(btn)btn.classList.add('active')

var views=document.querySelectorAll('.uview')
views.forEach(function(v){v.classList.remove('active')})

var v=document.getElementById('vu-'+user)
if(v)v.classList.add('active')

}


function switchTab(user,tab){

var panes=document.querySelectorAll('#vu-'+user+' .pane')
panes.forEach(function(p){p.classList.remove('active')})

var tabs=document.querySelectorAll('#vu-'+user+' .stab')
tabs.forEach(function(t){t.classList.remove('active')})

var targetPane=document.getElementById('pane-'+user+'-'+tab)
if(targetPane)targetPane.classList.add('active')

var targetTab=document.getElementById('tab-'+user+'-'+tab)
if(targetTab)targetTab.classList.add('active')

}


function createCase(){

var txt=document.getElementById('captureInput').value.trim()

if(txt.length<3){
alert("Describe the problem")
return
}

var c={
title:txt,
time:new Date()
}

cases.push(c)

renderCases()
renderTasks()

document.getElementById('captureInput').value=''

}


function renderCases(){

var list=document.getElementById('casesList')
list.innerHTML=""

if(cases.length===0){
list.innerHTML="No cases yet"
return
}

cases.forEach(function(c){

var div=document.createElement("div")
div.innerText=c.title

list.appendChild(div)

})

}


function renderTasks(){

var tl=document.getElementById('taskList')
tl.innerHTML=""

cases.forEach(function(c){

var div=document.createElement("div")
div.innerText=c.title

tl.appendChild(div)

})

}

</script>

</body>
</html>
