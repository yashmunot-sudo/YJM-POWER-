<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YJM Power – Test</title>
  <style>
    :root{
      --ink:#0A0F1E;
      --blue:#1B5FD4;
      --blue2:#2D7EFF;
      --gold:#F0A500;
      --green:#0DBF6F;
      --red:#F03E3E;
      --purple:#7B5CF0;
      --teal:#0CC2AA;
      --pink:#F045B0;
      --white:#F0F4FF;
      --muted:#5A7090;
      --border:rgba(45,126,255,0.15);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--ink);color:var(--white);font-family:sans-serif;min-height:100vh}
    .topbar{padding:12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
    .logo{display:flex;align-items:center}
    .logo-mark{width:30px;height:30px;background:var(--blue2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px}
    .logo-name{margin-left:8px;font-weight:800;font-size:14px;letter-spacing:2px}
    .wrap{max-width:900px;margin:0 auto;padding:16px}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark">YJM</div>
      <div class="logo-name">POWER</div>
    </div>
    <div style="font-size:12px;color:var(--muted)">Test OK</div>
  </div>

  <div class="wrap">
    <h1 style="font-size:20px;margin-bottom:8px">If you see this, the file is working.</h1>
    <p style="font-size:13px;color:var(--muted)">
      Next step: I will give you the rest of the dashboard to paste under this safely.
    </p>
  </div>
</body>
</html>
